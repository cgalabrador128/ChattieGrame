{% extends 'base.html' %}

{% block head %}
<link rel="stylesheet" href="{{ url_for('static', filename='discover.css') }}">
{% endblock %}

{% block body %}
<div class="discover-container">
    <div class="discover-header">
        <div class="header-title">
            <h1>Discover</h1>
        </div>
        <form action="/discover" method="post" class="search-form">
            <div class="type-input">
                <input type="text" name="query" placeholder="Search for users, or profile ID" required>
            </div>
            <button type="submit" class="search-button">Search</button>
        </form>
    </div>
    <div class = "discover-content">
        
        {% for user in users %}
            {% if user.userid != session.get('userid') %}
                <div class ="user-card">
                    <div class="profile-picture"><a href="/profile/{{ user.userid }}"><img src="{{ user.profile_image }}" alt="Profile Picture"></a></div>
                    <div class="name"><a href="/profile/{{ user.userid }}">{{ user.name }}</a></div>
                    <div class="button"> 
                        <button onclick="window.location.href='/messages/{{ user.userid }}'">Chat</button>
                        <button onclick="window.location.href='/friend_request/{{ user.userid }}'">Add Friend</button>
                    </div>
                {% endif %}
            {% endfor %}
        {% else %}
            <div class="no-results">
                <p>No results found.</p>
            </div>
        {% endif %}
    </div>
</div>
{% endblock %}
