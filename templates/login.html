<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <link rel="stylesheet" href="{{ url_for('static', filename='base.css') }}">
    <link rel="stylesheet" href="{{ url_for('static', filename='footer.css') }}">
    <link rel="icon" type="image/x-icon" href="{{ url_for('static', filename='resources/chattiegrameicon.ico') }}">
    <title>ChattieGrame</title>
    <link rel="stylesheet" href="{{ url_for('static', filename='auth.css') }}"/>
</head>

<body>
    <div class="container">
        <div class="auth-card">
            <div class="auth-header">
                <img src="{{ url_for('static', filename='resources/chattiegrameicon.ico') }}"class="auth-logo">
                <h1>CHATTIEGRAME</h1>
                <h2>Welcome!</h2>
            </div>

            {% if error %}
                <div class="alert error-alert">
                    {{ error }}
                </div>
            {% endif %}

            <div class="auth-form">
                <form action="/login" method="post">
                    <div class="input-group">
                        <label>Email</label>
                        <input type="email" name="email" placeholder="Enter your email" required>
                    </div>
                    <div class="input-group">
                        <label>Password</label>
                        <input type="password" name="password" placeholder="Enter your password" required>
                    </div>
                    <div class="submit">
                        <button type="submit">Login Account</button>
                    </div>
                </form>
                <div class="auth-footer">
                    <a href="/signup">I do not have an account yet.</a>
                </div>
            </div>
        </div>
    </div>
</body>
</html>
