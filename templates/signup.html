<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <link rel="stylesheet" href="{{ url_for('static', filename='base.css') }}">
    <link rel="stylesheet" href="{{ url_for('static', filename='footer.css') }}">
    <link rel="icon" type="image/x-icon" href="{{ url_for('static', filename='resources/chattiegrameicon.ico') }}">
    <title>ChattieGrame</title>
    <link rel="stylesheet" href="{{ url_for('static', filename='auth.css') }}"/>
</head>

<body>
    <div class="container">
        <div class="auth-card">
            <div class="auth-header">
                <img src="{{ url_for('static', filename='resources/chattiegrameicon.ico') }}"  class="auth-logo">
                <h1>CHATTIEGRAME</h1>
                <h2>Create a New Account</h2>
            </div>
            <div class="auth-form">
                <form action="/signup" method="post">
                    <div class="input-group">
                        <label>Name</label>
                        <input type="text" name="name" placeholder="Your name" required>
                    </div>

                    <div class="input-group">
                        <label>Email</label>
                        <input type="email" name="email" placeholder="Enter your email" required>
                    </div>

                    <div class="input-group">
                        <label>Password</label>
                        <input type="password" name="password" placeholder="At least 8 characters" minlength="8" required>
                    </div>

                    <div class="submit">
                        <button type="submit">Create Account</button>
                    </div>
                </form>
                <div class="auth-footer">
                    <a href="/login">I already have an account.</a>
                </div>
            </div>
        </div>
    </div>
</body>
</html>
